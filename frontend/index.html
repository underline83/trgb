    <!-- Boot splash custom (estende il tempo di splash iOS nativo) -->
    <!-- Aggiunto 2026-05-07. Lo splash iOS Safari dura ~1s; questo splash
         HTML inline si sovrappone PRIMA che React monti e resta visibile per
         __BOOT_SPLASH_MIN_MS__ ms (1000 = 1s, totale ~2s con iOS).
         Layout: wordmark TRGB + gobbette in onda + tagline + footer credit.
         Sparisce con fade-out 400ms al chiamare window.__hideBootSplash__()
         da main.jsx (con safety net 8s).
         APP_VERSION è iniettata da Vite (htmlVersionInjectorPlugin in
         vite.config.js) sostituendo il placeholder __APP_VERSION__. -->
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #F4F1EC;     /* brand-cream */
        color: #111111;          /* brand-ink */
        font-family: 'Helvetica Neue', -apple-system, sans-serif;
        opacity: 1;
        transition: opacity 400ms ease-out;
        gap: 0.9rem;
        padding: 2rem 1.5rem;
      }
      #boot-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #boot-splash .wordmark {
        font-size: 4rem;
        font-weight: 800;
        letter-spacing: 0.02em;
        line-height: 1;
      }
      #boot-splash .gobbette-strip {
        width: 220px;
        height: 50px;
      }
      #boot-splash .gobbette-strip path {
        stroke-width: 5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      /* Onda red→green→blue: 3 archetti pulse sfasati 0.2s */
      #boot-splash .gobbette-strip path:nth-child(1) {
        animation: trgb-pulse 1.6s ease-in-out infinite;
      }
      #boot-splash .gobbette-strip path:nth-child(2) {
        animation: trgb-pulse 1.6s ease-in-out infinite 0.2s;
      }
      #boot-splash .gobbette-strip path:nth-child(3) {
        animation: trgb-pulse 1.6s ease-in-out infinite 0.4s;
      }
      @keyframes trgb-pulse {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.4; }
      }
      #boot-splash .tagline {
        font-size: 0.95rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        color: #555;
        text-transform: uppercase;
      }
      #boot-splash .footer {
        position: absolute;
        bottom: 1.5rem;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 0.75rem;
        font-weight: 400;
        color: #888;
        line-height: 1.4;
      }
      #boot-splash .footer .version {
        font-weight: 600;
        color: #555;
      }
    </style>
  </head>
  <body class="bg-brand-cream">
    <div id="boot-splash">

      <span class="tagline">Osteria Tre Gobbi</span>
      <div class="footer">
        <div class="version">v__APP_VERSION__</div>
        <div>Designed &amp; Developed by Marco Carminati — Underline Studio</div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      // Tempo MINIMO che lo splash custom resta visibile (ms).
      // 1000ms + ~1s di splash iOS Safari ≈ 2s totali.
      window.__BOOT_SPLASH_MIN_MS__ = 1000;
      window.__BOOT_SPLASH_TS__ = Date.now();

      // Funzione invocabile da main.jsx quando React ha montato:
      // chiama window.__hideBootSplash__() e lo splash sparisce con fade.
      window.__hideBootSplash__ = function () {
        var el = document.getElementById('boot-splash');
        if (!el) return;
        var elapsed = Date.now() - window.__BOOT_SPLASH_TS__;
        var wait = Math.max(0, window.__BOOT_SPLASH_MIN_MS__ - elapsed);
        setTimeout(function () {
          el.classList.add('fade-out');
          setTimeout(function () { el.remove(); }, 450);
        }, wait);
      };

      // Safety net: se React non chiama __hideBootSplash__ entro 8s
      // (es. errore di boot), nasconde comunque lo splash così l'utente
      // vede o l'errore o la pagina.
      setTimeout(function () {
        if (document.getElementById('boot-splash')) {
          window.__hideBootSplash__();
        }
      }, 8000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
