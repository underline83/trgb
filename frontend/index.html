    <!-- Boot splash custom (estende il tempo di splash iOS nativo) -->
    <!-- Aggiunto 2026-05-07. Lo splash iOS Safari è gestito dal sistema e
         dura ~1s al boot dell'app standalone. Questo blocco è uno splash
         HTML che si sovrappone alla pagina PRIMA che React monti, e resta
         visibile per BOOT_SPLASH_MIN_MS millisecondi minimo (configurabile
         in index.html) o fino a quando React lo rimuove tramite postMessage.
         Sparisce con dissolvenza CSS 400ms. -->
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #F4F1EC;     /* brand-cream */
        color: #111111;          /* brand-ink */
        font-family: 'Helvetica Neue', -apple-system, sans-serif;
        font-weight: 800;
        font-size: 4rem;
        letter-spacing: 0.02em;
        opacity: 1;
        transition: opacity 400ms ease-out;
        gap: 1.5rem;
      }
      #boot-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #boot-splash .pulse {
        animation: trgb-pulse 1.6s ease-in-out infinite;
      }
      @keyframes trgb-pulse {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.5; }
      }
      #boot-splash .tagline {
        font-size: 0.95rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        color: #555;
        text-transform: uppercase;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body class="bg-brand-cream">
    <div id="boot-splash">
      <span class="pulse">TRGB</span>
      <span class="tagline">Osteria Tre Gobbi</span>
    </div>
    <div id="root"></div>
    <script>
      // Configurazione: tempo MINIMO che lo splash custom resta visibile
      // (ms) — anche se React è pronto prima, lo splash non sparisce prima
      // di questo timeout. Aumentare per allungare la transizione branded.
      window.__BOOT_SPLASH_MIN_MS__ = 1500;
      window.__BOOT_SPLASH_TS__ = Date.now();

      // Funzione invocabile da main.jsx quando React ha montato:
      // chiama window.__hideBootSplash__() e lo splash sparisce con fade.
      window.__hideBootSplash__ = function () {
        var el = document.getElementById('boot-splash');
        if (!el) return;
        var elapsed = Date.now() - window.__BOOT_SPLASH_TS__;
        var wait = Math.max(0, window.__BOOT_SPLASH_MIN_MS__ - elapsed);
        setTimeout(function () {
          el.classList.add('fade-out');
          setTimeout(function () { el.remove(); }, 450);
        }, wait);
      };

      // Safety net: se React non chiama __hideBootSplash__ entro 8s
      // (es. errore di boot), nasconde comunque lo splash così l'utente
      // vede o l'errore o la pagina.
      setTimeout(function () {
        if (document.getElementById('boot-splash')) {
          window.__hideBootSplash__();
        }
      }, 8000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
