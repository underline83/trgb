# /etc/nginx/sites-available/underlinestudio.it
# Sito personale Marco Carminati / Underline Studio — vetrina statica.
# Vive sullo stesso VPS di TRGB (Aruba 80.211.131.156) per economia infra.
#
# Nota disciplinare: questo dominio NON c'entra concettualmente con il
# prodotto TRGB. E' qui in deploy/sites/ solo perche' condividiamo il VPS.
# In futuro valutare se spostarlo in un repo dedicato.

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    listen [::]:80;
    server_name underlinestudio.it www.underlinestudio.it;

    location /.well-known/acme-challenge/ {
        root /var/www/_letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — sito statico vetrina ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name underlinestudio.it www.underlinestudio.it;

    root /var/www/underlinestudio.it;
    index index.html;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript image/svg+xml;
    gzip_min_length 1000;

    location ~* \.(svg|png|jpg|jpeg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
