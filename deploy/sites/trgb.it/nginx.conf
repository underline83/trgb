# /etc/nginx/sites-available/trgb.it
# Dominio prodotto TRGB — fase "Coming Soon" (pre-R4).
# Quando R4 sara' pronto, il blocco `root` sara' sostituito da `proxy_pass`
# verso il secondo backend TRGB (porta 8001, TRGB_LOCALE=trgb).

# ── HTTP → HTTPS redirect (certbot inserira' il blocco https dopo) ──
server {
    listen 80;
    listen [::]:80;
    server_name trgb.it www.trgb.it;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/_letsencrypt;
    }

    # Tutto il resto → HTTPS (certbot trasformera' questo in 301 redirect dopo init SSL)
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — sito statico Coming Soon ──
# NB: certbot aggiungera' automaticamente i blocchi `ssl_certificate` e
# `ssl_certificate_key` dopo l'esecuzione di `certbot --nginx`.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name trgb.it www.trgb.it;

    # Root del sito statico (Coming Soon)
    root /var/www/trgb.it;
    index index.html;

    # Security headers minimi
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip per HTML/CSS/SVG
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript image/svg+xml;
    gzip_min_length 1000;

    # Cache aggressiva per gli asset, no-cache per HTML
    location ~* \.(svg|png|jpg|jpeg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ── DOPO R4 ──
    # Sostituire il blocco `root + location /` sopra con:
    #
    # location / {
    #     proxy_pass http://127.0.0.1:8001;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
    #
    # E avviare il secondo systemd service `trgb-backend-trgb` che gira con
    # TRGB_LOCALE=trgb su porta 8001.
}
